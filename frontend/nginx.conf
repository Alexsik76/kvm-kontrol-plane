server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for static files
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # SPA routing — index.html НІКОЛИ не кешуємо
    location / {
        try_files $uri $uri/ /index.html;
        
        # index.html має завжди йти свіжим — інакше юзери ловлять старий
        # бандл-хеш і бачать застарілу версію
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Vite-bundled assets — content hash у назві → immutable на рік
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Іконки і шрифти без content hash — помірний кеш
    location ~* \.(?:ico|gif|jpe?g|png|webp|svg|woff2?|eot|ttf)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
    }
}
