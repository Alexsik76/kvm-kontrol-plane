# ==============================================================================
# IP-KVM Control Plane — Docker Compose (Monorepo layout)
#
# Monorepo structure:
#   control_plane/
#   ├── docker-compose.yml    ← this file (root of the repo)
#   ├── backend/              ← FastAPI application
#   └── frontend/             ← Vuetify SPA (to be created)
#
# No reverse-proxy service: traffic is routed through VPN/tunnel directly.
# For production add an SSH tunnel or WireGuard between the browser and the
# Docker host — Caddy is NOT part of this stack.
# ==============================================================================

services:
  # ----------------------------------------------------------------------------
  # FastAPI application (Uvicorn ASGI server)
  # ----------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: kvm_api
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER:-admin}
      - FIRST_SUPERUSER_EMAIL=${FIRST_SUPERUSER_EMAIL:-admin@kvm.local}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD}
      - NODE_POLL_INTERVAL_SECONDS=${NODE_POLL_INTERVAL_SECONDS:-15}
      - NODE_HTTP_TIMEOUT_SECONDS=${NODE_HTTP_TIMEOUT_SECONDS:-5}
      - KVM_API_TUNNEL_URL=${KVM_API_TUNNEL_URL}
      - NODE_DEFAULT_TUNNEL_URL=${NODE_DEFAULT_TUNNEL_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
    ports:
      # Exposed directly on the host (no proxy layer).
      - "8005:8000"
    volumes:
      # Mount host directory for hot-reload and saving migrations to host
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kvm_internal

  # ----------------------------------------------------------------------------
  # Vue.js + Vuetify Frontend SPA (Vite Dev Server)
  # ----------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
      - VITE_API_BASE_URL=${KVM_API_TUNNEL_URL}
      - VITE_TURN_URL=${EXTERNAL_PUBLIC_IP}
      - VITE_TURN_USERNAME=${TURN_USERNAME}
      - VITE_TURN_PASSWORD=${TURN_PASSWORD}
    container_name: kvm_frontend
    restart: unless-stopped
    
    ports:
      # Nginx listens on 80 internally, expose it on 3000 externally to not clash
      - "3000:80"
    volumes:
      # Map the host source code for instant Vite HMR
      - ./frontend:/app
      # Do not overwrite the container's node_modules with the host's
      # (prevents binary mismatches if host/container OS differ)
      - /app/node_modules
    depends_on:
      api:
        condition: service_started
    networks:
      - kvm_internal

  # ----------------------------------------------------------------------------
  # PostgreSQL 16 database
  # ----------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: kvm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kvmuser
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: kvmdb
    volumes:
      - kvm_pgdata:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - kvm_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kvmuser -d kvmdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  turn:
    image: coturn/coturn:latest
    container_name: kvm_turn
    restart: unless-stopped
    command:
      - turnserver
      - -n
      - --log-file=stdout
      - --listening-port=3478
      - --min-port=50000
      - --max-port=50050
      - --user=${TURN_USERNAME}:${TURN_PASSWORD}
      - --realm=lab.vn.ua
      - --external-ip=${EXTERNAL_PUBLIC_IP}
      - --listening-ip=0.0.0.0
      - --relay-ip=0.0.0.0
      - --lt-cred-mech
      - --no-tls
      - --no-dtls
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "50000-50050:50000-50050/udp"
    networks:
      - kvm_internal
# ------------------------------------------------------------------------------
# Named volumes
# ------------------------------------------------------------------------------
volumes:
  kvm_pgdata:

# ------------------------------------------------------------------------------
# Networks
# ------------------------------------------------------------------------------
networks:
  kvm_internal:
    driver: bridge
